name: Release

on:
  push:
    tags: ['v*']
  # Lets a maintainer republish a specific tag manually if the automated
  # run failed after an issue was fixed out-of-band.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: arduino/setup-protoc@v3
        with:
          version: '27.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Verify package.json version matches tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG declares version $TAG_VERSION but package.json has $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Generate proto code
        run: npm run gen-proto

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # `prepublishOnly` in package.json runs gen-proto + build again; the
      # earlier steps are so we get a clean lint/typecheck/test signal before
      # we touch npm.
      #
      # Auth comes from npm Trusted Publishing: the `id-token: write`
      # permission above exchanges this run's OIDC token for an npm auth
      # token transparently, scoped to @oxia-db/client. No long-lived
      # secret required.
      - name: Publish with provenance
        run: npm publish --access public --provenance
